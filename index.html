<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Em Breve — Algo está a formar-se</title>
<meta name="description" content="Quatro elementos. Uma força a convergir. Em breve.">

<!-- Fontes: Tenor Sans (display, elegante, tracking largo) + Space Grotesk (utilitária) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* ---- Paleta: void/abismo + 4 elementos ---- */
    --void:#06070c;
    --abyss:#0b0f1a;
    --deep-blue:#101a30;
    --fire:#ff8a4c;
    --water:#3fd1c9;
    --air:#d7defa;
    --earth:#b08a63;
    --ink:#eef1f8;
    --ink-dim:#9aa2ba;
    --ink-faint:#5b6478;

    --mx:0;
    --my:0;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--void);
  }

  body{
    font-family:'Space Grotesk', system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 50% 38%, var(--deep-blue) 0%, var(--abyss) 48%, var(--void) 100%);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  a{ color:inherit; text-decoration:none; }

  /* ================= CANVAS DE FUNDO ================= */
  #bg{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:1;
    pointer-events:none;
  }

  /* ================= MANCHAS ATMOSFÉRICAS (CSS) ================= */
  .atmosphere{
    position:fixed; inset:0; z-index:0;
    overflow:hidden; pointer-events:none;
  }
  .blob{
    position:absolute;
    width:46vmax; height:46vmax;
    border-radius:50%;
    filter:blur(60px);
    mix-blend-mode:screen;
    will-change:transform;
  }
  .blob.fire{  background:var(--fire);  top:-14%; right:-14%; opacity:.14; animation:drift 24s ease-in-out infinite alternate; }
  .blob.water{ background:var(--water); bottom:-16%; right:2%;  opacity:.13; animation:drift 30s ease-in-out infinite alternate-reverse; }
  .blob.air{   background:var(--air);   top:-10%; left:-16%;  opacity:.08; animation:drift 27s ease-in-out infinite alternate; }
  .blob.earth{ background:var(--earth); bottom:-14%; left:-10%; opacity:.13; animation:drift 33s ease-in-out infinite alternate-reverse; }

  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(3%,-4%) scale(1.06); }
    100%{ transform:translate(-2%,3%) scale(.98); }
  }

  /* ================= VINHETA DE LEGIBILIDADE ================= */
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background:
      radial-gradient(circle at 50% 46%, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 38%, rgba(2,3,6,.55) 78%, rgba(2,3,6,.85) 100%);
  }

  /* ================= MARCAS HUD NOS CANTOS ================= */
  .hud{ position:fixed; inset:0; z-index:3; pointer-events:none; }
  .hud i{
    position:absolute; width:26px; height:26px;
    opacity:.28;
  }
  .hud i::before, .hud i::after{
    content:''; position:absolute; background:var(--ink-faint);
  }
  .hud i::before{ width:100%; height:1px; top:0; left:0; }
  .hud i::after{  width:1px; height:100%; top:0; left:0; }
  .hud .tl{ top:24px; left:24px; }
  .hud .tr{ top:24px; right:24px; transform:scaleX(-1); }
  .hud .bl{ bottom:24px; left:24px; transform:scaleY(-1); }
  .hud .br{ bottom:24px; right:24px; transform:scale(-1,-1); }
  .hud .pulse{
    position:absolute; top:30px; right:30px;
    width:5px; height:5px; border-radius:50%;
    background:var(--water);
    box-shadow:0 0 8px 2px rgba(63,209,201,.7);
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }

  /* ---- Símbolos elementares nos cantos ---- */
  .hud .elem{
    position:absolute;
    width:24px; height:24px;
    fill:none;
    animation:elemBreathe 6.5s ease-in-out infinite;
  }
  .hud .elem.tl{ top:56px; left:56px; stroke:var(--air);  filter:drop-shadow(0 0 6px rgba(215,222,250,.55)); animation-delay:0s; }
  .hud .elem.tr{ top:56px; right:56px; stroke:var(--fire); filter:drop-shadow(0 0 6px rgba(255,138,76,.55)); animation-delay:1.6s; }
  .hud .elem.bl{ bottom:56px; left:56px; stroke:var(--water); filter:drop-shadow(0 0 6px rgba(63,209,201,.5)); animation-delay:3.2s; }
  .hud .elem.br{ bottom:56px; right:56px; stroke:var(--earth); filter:drop-shadow(0 0 6px rgba(176,138,99,.5)); animation-delay:4.8s; }

  @keyframes elemBreathe{
    0%,100%{ opacity:.3; transform:scale(1); }
    50%{ opacity:.62; transform:scale(1.1); }
  }

  /* ================= CONTEÚDO CENTRAL ================= */
  .stage{
    position:relative; z-index:10;
    height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px, 3vh, 30px);
    text-align:center;
    padding:0 6vw;
    transform:translate(calc(var(--mx) * 6px), calc(var(--my) * 4px));
    transition:transform .35s ease-out;
  }

  .stage > *{
    opacity:0;
    transform:translateY(16px);
    animation:rise 1.2s cubic-bezier(.19,1,.22,1) forwards;
  }
  .kicker      { animation-delay:.15s; }
  .title-wrap  { animation-delay:.4s;  }
  .logo-frame  { animation-delay:.75s; }
  .tagline     { animation-delay:1.05s;}

  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }

  .kicker{
    font-size:.72rem;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:500;
  }

  /* ---- EM BREVE ---- */
  .title-wrap{ position:relative; padding:.4em 0; }

  .title{
    position:relative;
    font-family:'Tenor Sans', sans-serif;
    font-size:clamp(2.3rem, 7.4vw, 5.4rem);
    letter-spacing:.3em;
    font-weight:400;
    text-transform:uppercase;
    line-height:1;
    background:linear-gradient(95deg,
      var(--ink) 0%, var(--ink) 30%,
      var(--fire) 38%, var(--ink) 46%,
      var(--ink) 54%, var(--water) 60%,
      var(--ink) 66%, var(--ink) 74%,
      var(--air) 80%, var(--ink) 86%,
      var(--ink) 92%, var(--earth) 97%, var(--ink) 100%);
    background-size:260% 100%;
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
    animation:shimmer 11s ease-in-out infinite alternate;
  }
  @keyframes shimmer{
    0%{ background-position:0% 0; }
    100%{ background-position:100% 0; }
  }

  .fx{ position:absolute; inset:-14px -3%; pointer-events:none; }

  .ember{
    position:absolute; width:3.5px; height:3.5px; border-radius:50%;
    background:var(--fire);
    box-shadow:0 0 9px 2px rgba(255,138,76,.85);
    opacity:0;
    animation:emberRise 5.2s ease-in infinite;
  }
  .ember:nth-child(1){ left:6%;  bottom:-4px; animation-delay:.2s; }
  .ember:nth-child(2){ left:48%; bottom:-10px; animation-delay:1.9s; }
  .ember:nth-child(3){ left:86%; bottom:-2px; animation-delay:3.3s; }
  @keyframes emberRise{
    0%{ opacity:0; transform:translateY(0) scale(.6); }
    14%{ opacity:.85; }
    100%{ opacity:0; transform:translateY(-44px) scale(1.15); }
  }

  .wisp-line{
    position:absolute; left:-12%; right:-12%; top:34%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(214,222,242,.55), transparent);
    filter:blur(1px);
    animation:wispDrift 9s ease-in-out infinite;
  }
  @keyframes wispDrift{
    0%,100%{ transform:translateX(-6%) scaleX(.8); opacity:.12; }
    50%{ transform:translateX(6%) scaleX(1.05); opacity:.48; }
  }

  /* ---- LOGÓTIPO CENTRAL ---- */
  .logo-frame{
    position:relative;
    width:clamp(195px, 26vw, 295px);
    aspect-ratio:1;
  }
  .logo-float{
    position:absolute; inset:0;
    animation:float 7s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }

  .logo-ring{
    position:absolute; inset:-16%;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--fire), var(--water), var(--air), var(--earth), var(--fire));
    -webkit-mask-image:radial-gradient(circle, transparent 0 71%, #000 73% 83%, transparent 86%);
            mask-image:radial-gradient(circle, transparent 0 71%, #000 73% 83%, transparent 86%);
    filter:blur(1.5px);
    opacity:.6;
    animation:spin 70s linear infinite;
  }
  .logo-ring.alt{
    inset:-7%;
    opacity:.35;
    -webkit-mask-image:radial-gradient(circle, transparent 0 86%, #000 88% 93%, transparent 96%);
            mask-image:radial-gradient(circle, transparent 0 86%, #000 88% 93%, transparent 96%);
    animation:spin 95s linear infinite reverse;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .logo-disc{
    position:absolute; inset:7%;
    border-radius:50%;
    background:
      radial-gradient(circle at 33% 28%, rgba(255,255,255,.06), rgba(255,255,255,0) 60%),
      rgba(8,10,17,.55);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
      0 0 46px rgba(63,140,255,.14),
      inset 0 0 30px rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    transition:box-shadow .5s ease, transform .5s ease;
  }
  .logo-disc svg{ width:62%; height:62%; }

  .logo-frame:hover .logo-frame-inner .logo-disc,
  .logo-frame:focus-within .logo-disc{
    box-shadow:
      0 0 64px rgba(63,140,255,.22),
      inset 0 0 30px rgba(0,0,0,.5);
  }
  .logo-frame:hover{ transform:scale(1.045); }
  .logo-frame{ transition:transform .5s ease; }

  /* Quando existir um logótipo real em PNG, basta substituir o conteúdo
     de #brandMark por: <img src="logo.png" alt="Logótipo" style="width:60%;height:auto;"> */

  .tagline{
    font-size:.85rem;
    letter-spacing:.06em;
    color:var(--ink-dim);
    max-width:380px;
  }
  .tagline strong{ color:var(--ink); font-weight:500; }

  /* ================= REDES SOCIAIS ================= */
  .socials{
    position:fixed; left:0; right:0; bottom:clamp(20px, 4vh, 40px);
    z-index:10;
    display:flex; justify-content:center; align-items:center;
    gap:clamp(18px, 3vw, 30px);
    opacity:0; transform:translateY(14px);
    animation:rise 1.2s cubic-bezier(.19,1,.22,1) forwards;
    animation-delay:1.3s;
  }
  .socials a{
    display:flex; align-items:center; justify-content:center;
    width:26px; height:26px;
    color:#cfd4e2;
    opacity:.78;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .35s ease, filter .35s ease;
  }
  .socials a svg{ width:100%; height:100%; }
  .socials a:hover, .socials a:focus-visible{
    opacity:1;
    transform:scale(1.16);
    filter:drop-shadow(0 0 8px rgba(214,222,242,.65));
    color:#ffffff;
  }
  .socials a:focus-visible{ outline:1px solid rgba(255,255,255,.4); outline-offset:6px; border-radius:4px; }

  /* ================= RESPONSIVO ================= */
  @media (max-width:540px){
    .kicker{ letter-spacing:.22em; font-size:.62rem; }
    .title{ letter-spacing:.2em; }
    .tagline{ font-size:.78rem; max-width:280px; }
    .socials{ gap:18px; }
    .hud i{ width:18px; height:18px; }
    .hud .elem{ width:18px; height:18px; }
    .hud .elem.tl{ top:42px; left:42px; }
    .hud .elem.tr{ top:42px; right:42px; }
    .hud .elem.bl{ bottom:42px; left:42px; }
    .hud .elem.br{ bottom:42px; right:42px; }
  }

  @media (max-height:560px){
    .stage{ gap:14px; }
    .logo-frame{ width:clamp(145px, 21vh, 210px); }
  }

  /* ================= ACESSIBILIDADE ================= */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>

  <script>
  (function(){
    'use strict';

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let W = 0, H = 0, DPR = 1;

    function resize(){
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function debounce(fn, ms){
      let id;
      return function(){ clearTimeout(id); id = setTimeout(fn, ms); };
    }

    window.addEventListener('resize', debounce(resize, 150));
    resize();

    /* ---------- rato / toque: parallax suave ---------- */
    const mouse  = { x:0, y:0 };
    const target = { x:0, y:0 };
    let lastInput = Date.now() - 9999;

    function setTarget(nx, ny){
      target.x = nx; target.y = ny; lastInput = Date.now();
    }
    window.addEventListener('mousemove', function(e){
      setTarget((e.clientX / W - 0.5) * 2, (e.clientY / H - 0.5) * 2);
    }, { passive:true });
    window.addEventListener('touchmove', function(e){
      const t = e.touches[0];
      if (!t) return;
      setTarget((t.clientX / W - 0.5) * 2, (t.clientY / H - 0.5) * 2);
    }, { passive:true });

    /* ---------- sprite de brilho (evita criar gradientes a cada frame) ---------- */
    function makeGlowSprite(rgb, size){
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const cx = c.getContext('2d');
      const g = cx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0, 'rgba(' + rgb + ',1)');
      g.addColorStop(1, 'rgba(' + rgb + ',0)');
      cx.fillStyle = g;
      cx.beginPath();
      cx.arc(size/2, size/2, size/2, 0, Math.PI*2);
      cx.fill();
      return c;
    }
    const fireSprite = makeGlowSprite('255,170,110', 64);

    function rand(a,b){ return a + Math.random() * (b - a); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    /* ---------- contagens adaptadas ao dispositivo ---------- */
    const isSmall = window.innerWidth < 720;
    const counts = reduceMotion
      ? { fire:12, earth:20 }
      : isSmall ? { fire:24, earth:42 } : { fire:42, earth:86 };

    /* ---------- Fogo: partículas a subir ---------- */
    function makeFire(){
      return {
        x: rand(0, W), y: H + rand(0, 80),
        r: rand(0.8, 2.4), sp: rand(0.22, 0.6),
        ph: rand(0, Math.PI*2), depth: rand(0.3, 1)
      };
    }
    function resetFire(p){
      p.x = rand(0, W); p.y = H + rand(0, 80);
      p.r = rand(0.8, 2.4); p.sp = rand(0.22, 0.6); p.ph = rand(0, Math.PI*2);
    }
    const fires = Array.from({ length: counts.fire }, makeFire);

    /* ---------- Terra: motas lentas ---------- */
    function makeEarth(){
      return {
        x: rand(0, W), y: rand(0, H),
        r: rand(0.6, 1.7), vx: rand(-0.035, 0.035), vy: rand(-0.025, 0.045),
        depth: rand(0.2, 0.8), a: rand(0.14, 0.42)
      };
    }
    const earths = Array.from({ length: counts.earth }, makeEarth);

    /* ---------- Água: ondulações ---------- */
    function makeWave(i){
      return {
        amp: rand(10, 20), len: rand(220, 420),
        speed: rand(0.15, 0.3) * (i % 2 ? 1 : -1),
        phase: rand(0, Math.PI*2), yBase: H * rand(0.6, 0.82), depth: rand(0.15, 0.4)
      };
    }
    const waterWaves = Array.from({ length: isSmall ? 2 : 3 }, function(_,i){ return makeWave(i); });

    /* ---------- Ar: véus etéreos ---------- */
    function makeWisp(i){
      return {
        y: rand(H*0.08, H*0.48), speed: rand(0.12, 0.24) * (i % 2 ? 1 : -1),
        phase: rand(0, Math.PI*2), depth: rand(0.2, 0.5), len: rand(260, 420), amp: rand(14, 28)
      };
    }
    const airWisps = Array.from({ length: isSmall ? 2 : 4 }, function(_,i){ return makeWisp(i); });

    let t = 0;

    function drawFire(mx, my){
      for (let i = 0; i < fires.length; i++){
        const p = fires[i];
        p.y -= p.sp;
        p.x += Math.sin(t * 0.02 + p.ph) * 0.3;
        if (p.y < -20) resetFire(p);
        const dx = p.x + mx * p.depth * 16;
        const dy = p.y + my * p.depth * 8;
        const alpha = clamp(0.55 * (1 - (H - p.y) / H * 0.15), 0, 0.55);
        const size = p.r * 12;
        ctx.globalAlpha = alpha;
        ctx.drawImage(fireSprite, dx - size/2, dy - size/2, size, size);
      }
      ctx.globalAlpha = 1;
    }

    function drawEarth(mx, my){
      for (let i = 0; i < earths.length; i++){
        const p = earths[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const dx = p.x + mx * p.depth * 22;
        const dy = p.y + my * p.depth * 14;
        ctx.fillStyle = 'rgba(176,138,99,' + p.a + ')';
        ctx.beginPath();
        ctx.arc(dx, dy, p.r, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function drawWater(mx, my){
      ctx.lineWidth = 1.1;
      ctx.strokeStyle = 'rgba(63,209,201,0.15)';
      for (let i = 0; i < waterWaves.length; i++){
        const w = waterWaves[i];
        w.phase += w.speed * 0.02;
        const dy = my * w.depth * 16;
        ctx.beginPath();
        for (let x = -40; x <= W + 40; x += 12){
          const y = w.yBase + dy + Math.sin(x / w.len * Math.PI*2 + w.phase) * w.amp;
          if (x === -40) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawAir(mx){
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(214,222,242,0.09)';
      for (let i = 0; i < airWisps.length; i++){
        const a = airWisps[i];
        a.phase += a.speed * 0.015;
        const dx = mx * a.depth * 20;
        ctx.beginPath();
        for (let x = -60; x <= W + 60; x += 14){
          const y = a.y + Math.sin(x / a.len * Math.PI*2 + a.phase) * a.amp;
          const xx = x + dx;
          if (x === -60) ctx.moveTo(xx, y); else ctx.lineTo(xx, y);
        }
        ctx.stroke();
      }
    }

    function frame(){
      if (document.hidden){ requestAnimationFrame(frame); return; }

      t += reduceMotion ? 0.12 : 0.6;
      mouse.x += (target.x - mouse.x) * 0.045;
      mouse.y += (target.y - mouse.y) * 0.045;

      let mx = mouse.x, my = mouse.y;
      if (Date.now() - lastInput > 4500 && !reduceMotion){
        mx += Math.sin(t * 0.004) * 0.22;
        my += Math.cos(t * 0.003) * 0.16;
      }

      ctx.clearRect(0, 0, W, H);
      drawWater(mx, my);
      drawAir(mx);
      drawEarth(mx, my);
      drawFire(mx, my);

      document.documentElement.style.setProperty('--mx', mx.toFixed(3));
      document.documentElement.style.setProperty('--my', my.toFixed(3));

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();
  </script>

</body>
</html>
