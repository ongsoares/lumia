<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Em Breve — Algo está a formar-se</title>
<meta name="description" content="Quatro elementos. Uma força a convergir. Em breve.">

<!-- Fontes: Cinzel Bold (título "Em Breve", conforme manual da marca) + Space Grotesk (utilitária) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* ---- Paleta: void/abismo + 4 elementos ---- */
    --void:#06070c;
    --abyss:#0b0f1a;
    --deep-blue:#101a30;
    --fire:#ff8a4c;
    --water:#3fd1c9;
    --air:#d7defa;
    --earth:#b08a63;
    /* Cores oficiais — Manual da Marca LUMIA (p.05) */
    --brand-pink:#F4B5CC;
    --brand-purple:#C64FD9;
    --brand-purple-deep:#652D90;
    --brand-amber:#f3a753;
    --ink:#eef1f8;
    --ink-dim:#9aa2ba;
    --ink-faint:#5b6478;

    --mx:0;
    --my:0;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--void);
  }

  body{
    font-family:'Space Grotesk', system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(ellipse 70% 55% at 50% 42%, rgba(198,79,217,.16) 0%, rgba(101,45,144,.10) 32%, transparent 68%),
      radial-gradient(ellipse 55% 40% at 84% 10%, rgba(243,167,83,.10) 0%, transparent 70%),
      radial-gradient(ellipse 60% 45% at 8% 88%, rgba(101,45,144,.14) 0%, transparent 70%),
      var(--void);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  a{ color:inherit; text-decoration:none; }

  /* ================= CANVAS DE FUNDO ================= */
  #bg{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:1;
    pointer-events:none;
  }

  /* ================= MANCHAS ATMOSFÉRICAS (CSS) ================= */
  .atmosphere{
    position:fixed; inset:0; z-index:0;
    overflow:hidden; pointer-events:none;
  }
  .blob{
    position:absolute;
    width:46vmax; height:46vmax;
    border-radius:50%;
    filter:blur(60px);
    mix-blend-mode:screen;
    will-change:transform;
  }
  .blob.fire{  background:var(--brand-amber);       top:-14%; right:-14%; opacity:.12; animation:drift 24s ease-in-out infinite alternate; }
  .blob.water{ background:var(--brand-purple);       bottom:-16%; right:2%;  opacity:.12; animation:drift 30s ease-in-out infinite alternate-reverse; }
  .blob.air{   background:var(--brand-purple-deep);  top:-10%; left:-16%;  opacity:.10; animation:drift 27s ease-in-out infinite alternate; }
  .blob.earth{ background:var(--brand-purple-deep);  bottom:-14%; left:-10%; opacity:.14; animation:drift 33s ease-in-out infinite alternate-reverse; }

  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(3%,-4%) scale(1.06); }
    100%{ transform:translate(-2%,3%) scale(.98); }
  }


  /* ================= CAMPO DE ESTRELAS (estilo nebulosa) ================= */
  .starfield, .starfield2{
    position:fixed; inset:-6%; z-index:0; pointer-events:none;
    background-repeat:repeat;
    transition:transform .6s ease-out;
  }
  .starfield{
    background-image:
      radial-gradient(1.06px 1.06px at 33.1% 16.5%, rgba(255,255,255,0.38), transparent 100%),
      radial-gradient(0.64px 0.64px at 53.4% 37.1%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(0.65px 0.65px at 5.6% 43.6%, rgba(255,255,255,0.39), transparent 100%),
      radial-gradient(0.69px 0.69px at 42.8% 81.4%, rgba(255,255,255,0.44), transparent 100%),
      radial-gradient(1.0px 1.0px at 62.2% 93.0%, rgba(255,255,255,0.51), transparent 100%),
      radial-gradient(1.2px 1.2px at 95.7% 6.5%, rgba(255,255,255,0.47), transparent 100%),
      radial-gradient(0.82px 0.82px at 15.8% 13.3%, rgba(255,255,255,0.68), transparent 100%),
      radial-gradient(1.05px 1.05px at 19.3% 57.8%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.64px 0.64px at 54.6% 8.0%, rgba(255,255,255,0.43), transparent 100%),
      radial-gradient(0.82px 0.82px at 67.3% 43.0%, rgba(255,255,255,0.58), transparent 100%),
      radial-gradient(1.16px 1.16px at 45.5% 30.8%, rgba(255,255,255,0.63), transparent 100%),
      radial-gradient(0.97px 0.97px at 25.4% 57.1%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(1.29px 1.29px at 72.0% 29.6%, rgba(255,255,255,0.4), transparent 100%),
      radial-gradient(0.71px 0.71px at 42.1% 74.7%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1.14px 1.14px at 5.8% 66.1%, rgba(255,255,255,0.58), transparent 100%),
      radial-gradient(1.09px 1.09px at 86.0% 32.1%, rgba(255,255,255,0.59), transparent 100%),
      radial-gradient(1.19px 1.19px at 57.7% 45.8%, rgba(255,255,255,0.73), transparent 100%),
      radial-gradient(0.64px 0.64px at 47.5% 65.8%, rgba(255,255,255,0.63), transparent 100%),
      radial-gradient(1.18px 1.18px at 64.1% 97.3%, rgba(255,255,255,0.46), transparent 100%),
      radial-gradient(0.62px 0.62px at 39.0% 66.2%, rgba(255,255,255,0.53), transparent 100%),
      radial-gradient(0.64px 0.64px at 18.1% 13.2%, rgba(255,255,255,0.66), transparent 100%),
      radial-gradient(0.87px 0.87px at 14.4% 25.8%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(0.98px 0.98px at 9.7% 45.1%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(0.79px 0.79px at 80.7% 84.9%, rgba(255,255,255,0.52), transparent 100%),
      radial-gradient(1.27px 1.27px at 36.4% 86.9%, rgba(255,255,255,0.41), transparent 100%),
      radial-gradient(0.76px 0.76px at 18.9% 24.3%, rgba(255,255,255,0.54), transparent 100%),
      radial-gradient(0.6px 0.6px at 58.6% 27.2%, rgba(255,255,255,0.52), transparent 100%),
      radial-gradient(1.27px 1.27px at 37.4% 56.4%, rgba(255,255,255,0.63), transparent 100%),
      radial-gradient(1.07px 1.07px at 51.5% 61.3%, rgba(255,255,255,0.37), transparent 100%),
      radial-gradient(1.21px 1.21px at 88.4% 76.9%, rgba(255,255,255,0.67), transparent 100%),
      radial-gradient(0.67px 0.67px at 39.7% 40.3%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(0.75px 0.75px at 8.0% 8.5%, rgba(255,255,255,0.41), transparent 100%),
      radial-gradient(0.6px 0.6px at 34.6% 7.0%, rgba(255,255,255,0.41), transparent 100%),
      radial-gradient(0.62px 0.62px at 11.7% 36.9%, rgba(255,255,255,0.7), transparent 100%),
      radial-gradient(0.78px 0.78px at 61.0% 16.3%, rgba(255,255,255,0.49), transparent 100%),
      radial-gradient(1.19px 1.19px at 37.0% 13.8%, rgba(255,255,255,0.75), transparent 100%),
      radial-gradient(0.66px 0.66px at 46.7% 48.4%, rgba(255,255,255,0.39), transparent 100%),
      radial-gradient(1.18px 1.18px at 34.9% 27.4%, rgba(255,255,255,0.41), transparent 100%),
      radial-gradient(0.97px 0.97px at 4.2% 93.3%, rgba(255,255,255,0.41), transparent 100%),
      radial-gradient(0.97px 0.97px at 54.1% 4.6%, rgba(255,255,255,0.74), transparent 100%),
      radial-gradient(0.78px 0.78px at 84.9% 68.8%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(0.97px 0.97px at 18.0% 76.1%, rgba(255,255,255,0.66), transparent 100%),
      radial-gradient(1.17px 1.17px at 33.6% 23.4%, rgba(255,255,255,0.74), transparent 100%),
      radial-gradient(1.17px 1.17px at 83.9% 79.4%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(0.85px 0.85px at 23.8% 51.7%, rgba(255,255,255,0.36), transparent 100%),
      radial-gradient(0.78px 0.78px at 4.7% 28.8%, rgba(255,255,255,0.63), transparent 100%),
      radial-gradient(1.26px 1.26px at 93.8% 44.9%, rgba(255,255,255,0.75), transparent 100%),
      radial-gradient(0.75px 0.75px at 93.7% 37.0%, rgba(255,255,255,0.44), transparent 100%),
      radial-gradient(1.04px 1.04px at 20.9% 21.6%, rgba(255,255,255,0.71), transparent 100%),
      radial-gradient(1.06px 1.06px at 82.7% 48.0%, rgba(255,255,255,0.67), transparent 100%),
      radial-gradient(1.24px 1.24px at 10.1% 65.4%, rgba(255,255,255,0.66), transparent 100%),
      radial-gradient(0.72px 0.72px at 74.0% 47.9%, rgba(255,255,255,0.67), transparent 100%),
      radial-gradient(1.28px 1.28px at 33.9% 78.9%, rgba(255,255,255,0.51), transparent 100%),
      radial-gradient(1.11px 1.11px at 40.5% 92.9%, rgba(255,255,255,0.42), transparent 100%),
      radial-gradient(1.23px 1.23px at 14.2% 16.5%, rgba(255,255,255,0.67), transparent 100%);
    background-size:560px 560px;
    opacity:.55;
    animation:twinkleA 7s ease-in-out infinite;
    transform:translate(calc(var(--mx) * 8px), calc(var(--my) * 6px));
  }
  .starfield2{
    background-image:
      radial-gradient(1.75px 1.75px at 26.9% 67.8%, rgba(255,255,255,0.84), transparent 100%),
      radial-gradient(1.32px 1.32px at 19.8% 24.1%, rgba(255,255,255,0.59), transparent 100%),
      radial-gradient(1.63px 1.63px at 72.5% 14.5%, rgba(255,255,255,0.59), transparent 100%),
      radial-gradient(1.87px 1.87px at 30.3% 43.4%, rgba(255,255,255,0.74), transparent 100%),
      radial-gradient(1.32px 1.32px at 3.4% 28.5%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1.86px 1.86px at 79.7% 79.4%, rgba(255,255,255,0.8), transparent 100%),
      radial-gradient(1.41px 1.41px at 93.1% 78.2%, rgba(255,255,255,0.84), transparent 100%),
      radial-gradient(1.65px 1.65px at 48.7% 74.5%, rgba(255,255,255,0.67), transparent 100%),
      radial-gradient(1.45px 1.45px at 37.0% 43.3%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1.99px 1.99px at 80.7% 78.6%, rgba(255,255,255,0.78), transparent 100%),
      radial-gradient(1.31px 1.31px at 55.2% 73.8%, rgba(255,255,255,0.77), transparent 100%),
      radial-gradient(1.36px 1.36px at 44.6% 19.0%, rgba(255,255,255,0.71), transparent 100%),
      radial-gradient(1.68px 1.68px at 26.3% 46.1%, rgba(255,255,255,0.66), transparent 100%),
      radial-gradient(1.39px 1.39px at 14.6% 49.1%, rgba(255,255,255,0.59), transparent 100%),
      radial-gradient(1.26px 1.26px at 20.7% 37.2%, rgba(255,255,255,0.76), transparent 100%),
      radial-gradient(1.78px 1.78px at 93.6% 39.4%, rgba(255,255,255,0.87), transparent 100%),
      radial-gradient(1.84px 1.84px at 6.1% 15.6%, rgba(255,255,255,0.84), transparent 100%),
      radial-gradient(1.53px 1.53px at 63.3% 17.3%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1.36px 1.36px at 87.1% 79.1%, rgba(255,255,255,0.84), transparent 100%),
      radial-gradient(1.31px 1.31px at 38.0% 70.8%, rgba(255,255,255,0.89), transparent 100%),
      radial-gradient(1.37px 1.37px at 59.9% 71.4%, rgba(255,255,255,0.75), transparent 100%),
      radial-gradient(1.49px 1.49px at 57.8% 58.8%, rgba(255,255,255,0.79), transparent 100%);
    background-size:760px 760px;
    opacity:.7;
    animation:twinkleB 5.5s ease-in-out infinite;
    transform:translate(calc(var(--mx) * 16px), calc(var(--my) * 11px));
  }
  @keyframes twinkleA{
    0%,100%{ opacity:.4; }
    50%{ opacity:.7; }
  }
  @keyframes twinkleB{
    0%,100%{ opacity:.55; }
    50%{ opacity:.9; }
  }

  /* ================= VINHETA DE LEGIBILIDADE ================= */
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background:
      radial-gradient(circle at 50% 46%, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 38%, rgba(2,3,6,.55) 78%, rgba(2,3,6,.85) 100%);
  }

  /* ================= MARCAS HUD NOS CANTOS ================= */
  .hud{ position:fixed; inset:0; z-index:3; pointer-events:none; }
  .hud i{
    position:absolute; width:26px; height:26px;
    opacity:.28;
  }
  .hud i::before, .hud i::after{
    content:''; position:absolute; background:var(--ink-faint);
  }
  .hud i::before{ width:100%; height:1px; top:0; left:0; }
  .hud i::after{  width:1px; height:100%; top:0; left:0; }
  .hud .tl{ top:24px; left:24px; }
  .hud .tr{ top:24px; right:24px; transform:scaleX(-1); }
  .hud .bl{ bottom:24px; left:24px; transform:scaleY(-1); }
  .hud .br{ bottom:24px; right:24px; transform:scale(-1,-1); }
  .hud .pulse{
    position:absolute; top:30px; right:30px;
    width:5px; height:5px; border-radius:50%;
    background:var(--water);
    box-shadow:0 0 8px 2px rgba(63,209,201,.7);
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }

  /* ---- Símbolos elementares nos cantos (ilustrações oficiais — Manual da Marca p.09) ---- */
  .hud .elem{
    position:absolute;
    width:38px; height:38px;
    object-fit:contain;
    opacity:.62;
    animation:elemBreathe 6.5s ease-in-out infinite;
  }
  .hud .elem.tl{ top:50px; left:50px; filter:drop-shadow(0 0 7px rgba(101,45,144,.55)); animation-delay:0s; }
  .hud .elem.tr{ top:50px; right:50px; filter:drop-shadow(0 0 7px rgba(243,138,77,.5));  animation-delay:1.6s; }
  .hud .elem.bl{ bottom:50px; left:50px; filter:drop-shadow(0 0 7px rgba(63,150,209,.5)); animation-delay:3.2s; }
  .hud .elem.br{ bottom:50px; right:50px; filter:drop-shadow(0 0 7px rgba(122,184,86,.5)); animation-delay:4.8s; }

  @keyframes elemBreathe{
    0%,100%{ opacity:.5; transform:scale(1); }
    50%{ opacity:.82; transform:scale(1.08); }
  }

  /* ================= CONTEÚDO CENTRAL ================= */
  .stage{
    position:relative; z-index:10;
    height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px, 3vh, 30px);
    text-align:center;
    padding:0 6vw;
    transform:translate(calc(var(--mx) * 6px), calc(var(--my) * 4px));
    transition:transform .35s ease-out;
  }

  .stage > *{
    opacity:0;
    transform:translateY(16px);
    animation:rise 1.2s cubic-bezier(.19,1,.22,1) forwards;
  }
  .kicker      { animation-delay:.15s; }
  .title-wrap  { animation-delay:.4s;  }
  .logo-frame  { animation-delay:.75s; }
  .tagline     { animation-delay:1.05s;}

  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }

  .kicker{
    font-size:.72rem;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:500;
  }

  /* ---- EM BREVE ---- */
  .title-wrap{ position:relative; padding:.4em 0; }

  .title{
    position:relative;
    font-family:'Cinzel', serif;
    font-size:clamp(2.15rem, 6.8vw, 5rem);
    letter-spacing:.22em;
    font-weight:700;
    text-transform:uppercase;
    line-height:1;
    background:linear-gradient(95deg,
      var(--ink) 0%, var(--ink) 26%,
      var(--brand-purple) 34%, var(--brand-purple-deep) 40%, var(--ink) 48%,
      var(--ink) 58%,
      var(--brand-purple-deep) 66%, var(--brand-pink) 72%, var(--ink) 80%,
      var(--ink) 100%);
    background-size:260% 100%;
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
    animation:shimmer 11s ease-in-out infinite alternate;
  }
  @keyframes shimmer{
    0%{ background-position:0% 0; }
    100%{ background-position:100% 0; }
  }

  .fx{ position:absolute; inset:-14px -3%; pointer-events:none; }

  .ember{
    position:absolute; width:3.5px; height:3.5px; border-radius:50%;
    background:var(--fire);
    box-shadow:0 0 9px 2px rgba(255,138,76,.85);
    opacity:0;
    animation:emberRise 5.2s ease-in infinite;
  }
  .ember:nth-child(1){ left:6%;  bottom:-4px; animation-delay:.2s; }
  .ember:nth-child(2){ left:48%; bottom:-10px; animation-delay:1.9s; }
  .ember:nth-child(3){ left:86%; bottom:-2px; animation-delay:3.3s; }
  @keyframes emberRise{
    0%{ opacity:0; transform:translateY(0) scale(.6); }
    14%{ opacity:.85; }
    100%{ opacity:0; transform:translateY(-44px) scale(1.15); }
  }

  .wisp-line{
    position:absolute; left:-12%; right:-12%; top:34%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(214,222,242,.55), transparent);
    filter:blur(1px);
    animation:wispDrift 9s ease-in-out infinite;
  }
  @keyframes wispDrift{
    0%,100%{ transform:translateX(-6%) scaleX(.8); opacity:.12; }
    50%{ transform:translateX(6%) scaleX(1.05); opacity:.48; }
  }

  /* ---- LOGÓTIPO CENTRAL ---- */
  .logo-frame{
    position:relative;
    width:clamp(195px, 26vw, 295px);
    aspect-ratio:1;
  }
  .logo-float{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    animation:float 7s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }

  .logo-img{
    width:100%; height:auto;
    filter:drop-shadow(0 0 28px rgba(198,79,217,.22)) drop-shadow(0 0 54px rgba(101,45,144,.18));
    transition:filter .5s ease, transform .5s ease;
  }

  .logo-frame:hover .logo-img,
  .logo-frame:focus-within .logo-img{
    filter:drop-shadow(0 0 38px rgba(198,79,217,.34)) drop-shadow(0 0 72px rgba(101,45,144,.26));
  }
  .logo-frame:hover{ transform:scale(1.045); }
  .logo-frame{ transition:transform .5s ease; }

  /* Logótipo: ficheiro logo.png na mesma pasta do index.html.
     Para trocar o ficheiro, basta substituir logo.png mantendo o mesmo nome,
     ou atualizar o atributo src da tag <img class="logo-img"> no HTML. */

  .tagline{
    font-size:.85rem;
    letter-spacing:.06em;
    color:var(--ink-dim);
    max-width:380px;
  }
  .tagline strong{ color:var(--ink); font-weight:500; }

  /* ================= REDES SOCIAIS ================= */
  .socials{
    position:fixed; left:0; right:0; bottom:clamp(20px, 4vh, 40px);
    z-index:10;
    display:flex; justify-content:center; align-items:center;
    gap:clamp(18px, 3vw, 30px);
    opacity:0; transform:translateY(14px);
    animation:rise 1.2s cubic-bezier(.19,1,.22,1) forwards;
    animation-delay:1.3s;
  }
  .socials a{
    display:flex; align-items:center; justify-content:center;
    width:26px; height:26px;
    color:#cfd4e2;
    opacity:.78;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .35s ease, filter .35s ease;
  }
  .socials a svg{ width:100%; height:100%; }
  .socials a:hover, .socials a:focus-visible{
    opacity:1;
    transform:scale(1.16);
    filter:drop-shadow(0 0 8px rgba(214,222,242,.65));
    color:#ffffff;
  }
  .socials a:focus-visible{ outline:1px solid rgba(255,255,255,.4); outline-offset:6px; border-radius:4px; }

  /* ================= RESPONSIVO ================= */
  @media (max-width:540px){
    .kicker{ letter-spacing:.22em; font-size:.62rem; }
    .title{ letter-spacing:.2em; }
    .tagline{ font-size:.78rem; max-width:280px; }
    .socials{ gap:18px; }
    .hud i{ width:18px; height:18px; }
    .hud .elem{ width:28px; height:28px; }
    .hud .elem.tl{ top:38px; left:38px; }
    .hud .elem.tr{ top:38px; right:38px; }
    .hud .elem.bl{ bottom:38px; left:38px; }
    .hud .elem.br{ bottom:38px; right:38px; }
  }

  @media (max-height:560px){
    .stage{ gap:14px; }
    .logo-frame{ width:clamp(145px, 21vh, 210px); }
  }

  /* ================= ACESSIBILIDADE ================= */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
      scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>

  <!-- Fundo interativo: partículas dos quatro elementos -->
  <canvas id="bg" aria-hidden="true"></canvas>

  <div class="atmosphere" aria-hidden="true">
    <div class="blob fire"></div>
    <div class="blob water"></div>
    <div class="blob air"></div>
    <div class="blob earth"></div>
  </div>

  <div class="starfield" aria-hidden="true"></div>
  <div class="starfield2" aria-hidden="true"></div>

  <div class="vignette" aria-hidden="true"></div>

  <div class="hud" aria-hidden="true">
    <i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i>
    <span class="pulse"></span>

  <script>
  (function(){
    'use strict';

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let W = 0, H = 0, DPR = 1;

    function resize(){
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function debounce(fn, ms){
      let id;
      return function(){ clearTimeout(id); id = setTimeout(fn, ms); };
    }

    window.addEventListener('resize', debounce(resize, 150));
    resize();

    /* ---------- rato / toque: parallax suave ---------- */
    const mouse  = { x:0, y:0 };
    const target = { x:0, y:0 };
    let lastInput = Date.now() - 9999;

    function setTarget(nx, ny){
      target.x = nx; target.y = ny; lastInput = Date.now();
    }
    window.addEventListener('mousemove', function(e){
      setTarget((e.clientX / W - 0.5) * 2, (e.clientY / H - 0.5) * 2);
    }, { passive:true });
    window.addEventListener('touchmove', function(e){
      const t = e.touches[0];
      if (!t) return;
      setTarget((t.clientX / W - 0.5) * 2, (t.clientY / H - 0.5) * 2);
    }, { passive:true });

    /* ---------- sprite de brilho (evita criar gradientes a cada frame) ---------- */
    function makeGlowSprite(rgb, size){
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const cx = c.getContext('2d');
      const g = cx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0, 'rgba(' + rgb + ',1)');
      g.addColorStop(1, 'rgba(' + rgb + ',0)');
      cx.fillStyle = g;
      cx.beginPath();
      cx.arc(size/2, size/2, size/2, 0, Math.PI*2);
      cx.fill();
      return c;
    }
    const fireSprite = makeGlowSprite('255,170,110', 64);

    function rand(a,b){ return a + Math.random() * (b - a); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    /* ---------- contagens adaptadas ao dispositivo ---------- */
    const isSmall = window.innerWidth < 720;
    const counts = reduceMotion
      ? { fire:12, earth:20 }
      : isSmall ? { fire:24, earth:42 } : { fire:42, earth:86 };

    /* ---------- Fogo: partículas a subir ---------- */
    function makeFire(){
      return {
        x: rand(0, W), y: H + rand(0, 80),
        r: rand(0.8, 2.4), sp: rand(0.22, 0.6),
        ph: rand(0, Math.PI*2), depth: rand(0.3, 1)
      };
    }
    function resetFire(p){
      p.x = rand(0, W); p.y = H + rand(0, 80);
      p.r = rand(0.8, 2.4); p.sp = rand(0.22, 0.6); p.ph = rand(0, Math.PI*2);
    }
    const fires = Array.from({ length: counts.fire }, makeFire);

    /* ---------- Terra: motas lentas ---------- */
    function makeEarth(){
      return {
        x: rand(0, W), y: rand(0, H),
        r: rand(0.6, 1.7), vx: rand(-0.035, 0.035), vy: rand(-0.025, 0.045),
        depth: rand(0.2, 0.8), a: rand(0.14, 0.42)
      };
    }
    const earths = Array.from({ length: counts.earth }, makeEarth);

    /* ---------- Água: ondulações ---------- */
    function makeWave(i){
      return {
        amp: rand(10, 20), len: rand(220, 420),
        speed: rand(0.15, 0.3) * (i % 2 ? 1 : -1),
        phase: rand(0, Math.PI*2), yBase: H * rand(0.6, 0.82), depth: rand(0.15, 0.4)
      };
    }
    const waterWaves = Array.from({ length: isSmall ? 2 : 3 }, function(_,i){ return makeWave(i); });

    /* ---------- Ar: véus etéreos ---------- */
    function makeWisp(i){
      return {
        y: rand(H*0.08, H*0.48), speed: rand(0.12, 0.24) * (i % 2 ? 1 : -1),
        phase: rand(0, Math.PI*2), depth: rand(0.2, 0.5), len: rand(260, 420), amp: rand(14, 28)
      };
    }
    const airWisps = Array.from({ length: isSmall ? 2 : 4 }, function(_,i){ return makeWisp(i); });

    let t = 0;

    function drawFire(mx, my){
      for (let i = 0; i < fires.length; i++){
        const p = fires[i];
        p.y -= p.sp;
        p.x += Math.sin(t * 0.02 + p.ph) * 0.3;
        if (p.y < -20) resetFire(p);
        const dx = p.x + mx * p.depth * 16;
        const dy = p.y + my * p.depth * 8;
        const alpha = clamp(0.55 * (1 - (H - p.y) / H * 0.15), 0, 0.55);
        const size = p.r * 12;
        ctx.globalAlpha = alpha;
        ctx.drawImage(fireSprite, dx - size/2, dy - size/2, size, size);
      }
      ctx.globalAlpha = 1;
    }

    function drawEarth(mx, my){
      for (let i = 0; i < earths.length; i++){
        const p = earths[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const dx = p.x + mx * p.depth * 22;
        const dy = p.y + my * p.depth * 14;
        ctx.fillStyle = 'rgba(176,138,99,' + p.a + ')';
        ctx.beginPath();
        ctx.arc(dx, dy, p.r, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function drawWater(mx, my){
      ctx.lineWidth = 1.1;
      ctx.strokeStyle = 'rgba(63,209,201,0.15)';
      for (let i = 0; i < waterWaves.length; i++){
        const w = waterWaves[i];
        w.phase += w.speed * 0.02;
        const dy = my * w.depth * 16;
        ctx.beginPath();
        for (let x = -40; x <= W + 40; x += 12){
          const y = w.yBase + dy + Math.sin(x / w.len * Math.PI*2 + w.phase) * w.amp;
          if (x === -40) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawAir(mx){
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(214,222,242,0.09)';
      for (let i = 0; i < airWisps.length; i++){
        const a = airWisps[i];
        a.phase += a.speed * 0.015;
        const dx = mx * a.depth * 20;
        ctx.beginPath();
        for (let x = -60; x <= W + 60; x += 14){
          const y = a.y + Math.sin(x / a.len * Math.PI*2 + a.phase) * a.amp;
          const xx = x + dx;
          if (x === -60) ctx.moveTo(xx, y); else ctx.lineTo(xx, y);
        }
        ctx.stroke();
      }
    }

    function frame(){
      if (document.hidden){ requestAnimationFrame(frame); return; }

      t += reduceMotion ? 0.12 : 0.6;
      mouse.x += (target.x - mouse.x) * 0.045;
      mouse.y += (target.y - mouse.y) * 0.045;

      let mx = mouse.x, my = mouse.y;
      if (Date.now() - lastInput > 4500 && !reduceMotion){
        mx += Math.sin(t * 0.004) * 0.22;
        my += Math.cos(t * 0.003) * 0.16;
      }

      ctx.clearRect(0, 0, W, H);
      drawWater(mx, my);
      drawAir(mx);
      drawEarth(mx, my);
      drawFire(mx, my);

      document.documentElement.style.setProperty('--mx', mx.toFixed(3));
      document.documentElement.style.setProperty('--my', my.toFixed(3));

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();
  </script>
